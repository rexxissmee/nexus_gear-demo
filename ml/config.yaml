# ML Pipeline Config – Session Hijacking Detection MVP
# Version: 1.0.0

# Reproducibility
seed: 42

# Database (override via .env.ml or environment variable DATABASE_URL)
database_url: ""   # set via env var DATABASE_URL

# Feature Builder (M2)
feature_builder:
  window_length: 30        # L – sequence length
  stride: 5                # sliding window stride
  min_session_length: 5    # discard sessions shorter than this
  dt_transform: log1p      # log(1 + delta_t_ms)
  label_normal: 0          # label for normal sessions
  label_attack: 1          # label for attack sessions (for eval only)
  output_dir: artifacts/datasets

# Model Architecture (M3)
model:
  vocab_size: 21           # |V| = len(vocab.json)
  embedding_dim: 64
  lstm_hidden: 256
  lstm_layers: 2
  dropout: 0.2
  use_dt_head: false       # optional delta_t regression head

# Training (M3)
training:
  epochs: 30
  batch_size: 64
  learning_rate: 0.001
  weight_decay: 1.0e-4
  patience: 5              # early stopping patience
  val_split: 0.15
  test_split: 0.10
  lambda_dt: 0.1           # weight for delta_t loss (if use_dt_head)

# Scoring (M4)
scoring:
  score_fn: mean           # mean or max window step score
  alpha_dt: 0.2            # weight for time surprise

# Policy Thresholds (M4 – update after calibration)
policy:
  warn_percentile: 99      # P99
  block_percentile: 99.9   # P99.9
  ema_alpha: 0.3           # β
  warn_consecutive: 2
  revoke_consecutive: 3

# Output
artifacts:
  model_dir: artifacts/models
  dataset_dir: artifacts/datasets
  report_dir: artifacts/reports
