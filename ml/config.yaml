artifacts:
  dataset_dir: artifacts/datasets
  model_dir: artifacts/models
  report_dir: artifacts/reports
database_url: ''
feature_builder:
  dt_transform: log1p
  label_attack: 1
  label_normal: 0
  min_session_length: 5
  output_dir: artifacts/datasets
  stride: 5
  window_length: 30
model:
  dropout: 0.2
  embedding_dim: 64
  extra_dim: 9
  lstm_hidden: 256
  lstm_layers: 2
  use_dt_head: false
  vocab_size: 22
policy:
  block_percentile: 99.9
  ema_alpha: 0.3
  revoke_consecutive: 3
  step_up_consecutive: 2
  step_up_percentile: 99
scoring:
  alpha_dt: 0.2
  score_fn: mean
seed: 42
training:
  batch_size: 64
  epochs: 30
  learning_rate: 0.001
  patience: 5
  pos_weight: 10.0
  test_split: 0.1
  val_split: 0.15
  weight_decay: 0.0001
