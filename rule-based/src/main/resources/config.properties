# Rule-Based Scorer Configuration
# DB connection is read from ../.env (DATABASE_URL) via dotenv-java

# Windowing parameters (match Python ml/config.yaml)
window.length=30
window.stride=5
window.minSessionLength=5

# Rule scoring weights
rule.weight.ip_change=2.0
rule.weight.ua_change=1.5
rule.weight.device_change=2.5
rule.weight.status_401=1.0
rule.weight.status_403=1.2
rule.weight.req_burst=1.8

# Output
output.dir=output
output.filename=rule_based_scores.csv
